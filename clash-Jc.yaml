# ========================
# openclash-基础版
# ========================

proxy-providers:

  美建:
    url: "https://ljlsjvps.lyux1n.com:2096/Clash/s5wtxdsqvnxqodoi"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 180
    proxy: DIRECT
  美住:
    url: "https://n1yxl.lyux1n.com:2096/clash/t0aldywtpf840a3s"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 180
    proxy: DIRECT
  日本:
    url: "http://45.143.234.163:2096/sub/1tx41Y9r?format=clash"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 180
    proxy: DIRECT

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}
# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
secret: "981222"

# ========================
# DNS 设置
# ========================
dns:

  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 'https://dns.alidns.com/dns-query'
    - 'https://doh.pub/dns-query'
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
# 用于自建的域名不可直连的解决方案 按需求取消注释    
  nameserver-policy:
    '+.lyux1n.com': 'https://dns.alidns.com/dns-query'

ipv6: true

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: system
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true
 
# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 直连
    - 🚀 所有-手动
    - ⚡ 所有-自动
    - 🇯🇵 日本-手动
    - 🇯🇵 日本-故转
    - 🇺🇸 美建-手动
    - 🇺🇸 美建-故转
    - 🇺🇸 美住-手动
    - 🇺🇸 美住-故转
    - 拒绝

# ========================================================
#                  业务分流组
# ========================================================
proxy-groups:
  - {name: 🧪 Test, <<: *default}
  - {name: 🧠 AI, <<: *default}      
  - {name: 💳 PayPal, <<: *default}
  - {name: 🛍️ Shopping, <<: *default}
  - {name: 📺 Youtube, <<: *default}
  - {name: 🎵 TikTok, <<: *default}
  - {name: 🐦 Twitter, <<: *default}
  - {name: ✈️ Telegram, <<: *default}
  - {name: 🐱 GitHub, <<: *default}
  - {name: 🍏 Apple, <<: *default}
  - {name: 💻 微软, <<: *default}
  - {name: 🔍 Google, <<: *default}
  - {name: 🎥 Netflix, <<: *default}
  - {name: 📹 流媒体, <<: *default}  
  - {name: 🎮 Steam, <<: *default}
  - {name: 🛑 国外, <<: *default}        
  - {name: 🇨🇳 国内, <<: *default}
  - {name: ⚓ 其他, <<: *default}
  # - {name: 🚫 Block, <<: *default}

  - name: 🚀 所有-手动
    type: select
    include-all: true
    exclude-filter: "(直连|拒绝)"

  - name: ⚡ 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    exclude-filter: "(直连|拒绝)"
    
  # 同行组
  - name: 🇯🇵 日本-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🇯🇵 日本-手动
      - 🇯🇵 日本-自动
  
  - name: 🇯🇵 日本-手动
    type: select
    include-all: true
    filter: "(hysteria2|vless|trojan)"
    
  - name: 🇯🇵 日本-自动
    type: url-test
    tolerance: 50
    interval: 180
    include-all: true
    filter: "(hysteria2|vless|trojan)"

  # 自建组
  - name: 🇺🇸 美住-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🇺🇸 美住-手动
      - 🇺🇸 美住-自动

  - name: 🇺🇸 美住-手动
    type: select
    include-all: true
    filter: "美住"

  - name: 🇺🇸 美住-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "美住"
    
  - name: 🇺🇸 美建-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🇺🇸 美建-手动
      - 🇺🇸 美建-自动

  - name: 🇺🇸 美建-手动
    type: select
    include-all: true
    filter: "美建"

  - name: 🇺🇸 美建-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "美建"

  # 其他组
  
  - name: 🌍 其他-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🌍 其他-手动
      - 🌍 其他-自动

  - name: 🌍 其他-手动
    type: select
    proxies:                 
      - 直连 
      - 拒绝
      - 🚀 所有-手动            
      - ⚡ 所有-自动           
      - 🇺🇸 美住-自动 
      - 🇺🇸 美建-自动            
      - 🇯🇵 日本-自动             
  
  - name: 🌍 其他-自动
    type: url-test
    tolerance: 50
    interval: 180
    proxies:                               
      - 🇺🇸 美住-自动 
      - 🇺🇸 美建-自动            
      - 🇯🇵 日本-自动 

# ========================
# 规则路由策略 (自顶向下匹配)
# ========================
rules:
  - RULE-SET,Private / Domain,🇨🇳 国内
  - RULE-SET,Private / IP,🇨🇳 国内,no-resolve
