# ========================
# openclash-非链式代理版
# ========================

# 机场节点订阅
proxy-providers:

  自建:
    url: "机场地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 180
    proxy: ⚡ 所有-自动
  同行:
    url: "机场地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 180
    proxy: DIRECT

# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
secret: "981222"

# ========================
# DNS 设置
# ========================
dns:

  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 223.5.5.5
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
     
ipv6: true

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: system
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true
  
# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 直连
    - 🚀 所有-手动
    - ⚡ 所有-自动
    - 🇯🇵 日本-手动
    - 🇯🇵 日本-故转
    - 🇯🇵 日本-链式前置
    - 🇺🇸 美国-手动
    - 🇺🇸 美国-故转
    - 🌍 其他-故转
    - 拒绝

# ========================================================
#                 业务分流组
# ========================================================
proxy-groups:
  - name: 直连
    type: select
    proxies:
     - DIRECT
  - name: 拒绝
    type: select
    proxies:
      - REJECT     

  - {name: 🧪 Test, <<: *default}
  - {name: 🚫 Block, <<: *default}
  - {name: 🧠 AI, <<: *default}      
  - {name: 💳 PayPal, <<: *default}
  - {name: 🛍️ Shopping, <<: *default}
  - {name: 📺 Youtube, <<: *default}
  - {name: 🎵 TikTok, <<: *default}
  - {name: 🐦 Twitter, <<: *default}
  - {name: ✈️ Telegram, <<: *default}
  - {name: 🐱 GitHub, <<: *default}
  - {name: 🍏 Apple, <<: *default}
  - {name: 💻 微软, <<: *default}
  - {name: 🔍 Google, <<: *default}
  - {name: 🎥 Netflix, <<: *default}
  - {name: 📹 流媒体, <<: *default}  
  - {name: 🎮 Steam, <<: *default}
  - {name: 🛑 国外, <<: *default}         
  - {name: 🇨🇳 国内, <<: *default}
  - {name: ⚓ 其他, <<: *default}

  - name: 🚀 所有-手动
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"

  - name: ⚡ 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "^((?!(直连|拒绝)).)*$"
    
  # 日本组
  - name: 🇯🇵 日本-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🇯🇵 日本-手动
      - 🇯🇵 日本-自动
  
  - name: 🇯🇵 日本-手动
    type: select
    use:
      - 自建
      - 同行
    filter: "^(hysteria2-33752|vless-56270|trojan-47494)$"
    
  - name: 🇯🇵 日本-自动
    type: url-test
    tolerance: 50
    interval: 180
    use:
      - 自建
      - 同行
    filter: "^(hysteria2-33752|vless-56270|trojan-47494)$"

  # 美国组
  - name: 🇺🇸 美国-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🇺🇸 美国-手动
      - 🇺🇸 美国-自动
      
  - name: 🇺🇸 美国-手动
    type: select
    include-all: true
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  - name: 🇺🇸 美国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  # 其他组
  - name: 🌍 其他-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 🌍 其他-手动
      - 🌍 其他-自动


  - name: 🌍 其他-手动
    type: select
    proxies:
      - 直连
      - 拒绝                     
      - 🚀 所有-手动            
      - ⚡ 所有-自动           
      - 🇺🇸 美国-自动             
      - 🇯🇵 日本-自动             
  
  - name: 🌍 其他-自动
    type: url-test
    tolerance: 50
    interval: 180
    proxies:                               
      - 🇺🇸 美国-自动             
      - 🇯🇵 日本-自动 

# ========================
# 规则引擎-rules
# ========================
rules:
  - RULE-SET,TEST / Domain,🧪 Test
  - RULE-SET,Block / Domain,🚫 Block          
  - RULE-SET,AI / Domain,🧠 AI
  - RULE-SET,PayPal / Domain,💳 PayPal
  - RULE-SET,Shopping / Domain,🛍️ Shopping 
  - RULE-SET,Youtube / Domain,📺 Youtube
  - RULE-SET,TikTok / Domain,🎵 TikTok
  - RULE-SET,Twitter / Domain,🐦 Twitter
  - RULE-SET,Telegram / Domain,✈️ Telegram
  - RULE-SET,Telegram / IP,✈️ Telegram,no-resolve
  - RULE-SET,GitHub / Domain,🐱 GitHub
  - RULE-SET,Apple-Custome / Domain,🍏 Apple
  - RULE-SET,Apple-CN / Domain,DIRECT     # 苹果国内服务直连
  - RULE-SET,Apple / Domain,🍏 Apple 
  - RULE-SET,Microsoft / Domain,💻 微软
  - RULE-SET,Google / Domain,🔍 Google
  - RULE-SET,Google / IP,🔍 Google,no-resolve
  - RULE-SET,Netflix / Domain,🎥 Netflix
  - RULE-SET,Netflix / IP,🎥 Netflix,no-resolve
  - RULE-SET,GlobalMedia / Domain,📹 流媒体
  - RULE-SET,Steam / Domain,🎮 Steam      
  - RULE-SET,Proxy / Domain,🛑 国外
  - RULE-SET,Globe / Domain,🛑 国外  
  - RULE-SET,Direct / Domain,🇨🇳 国内
  - RULE-SET,China / Domain,🇨🇳 国内
  - RULE-SET,China / IP,🇨🇳 国内,no-resolve
  - RULE-SET,Private / Domain,🇨🇳 国内
  - MATCH,⚓ 其他


